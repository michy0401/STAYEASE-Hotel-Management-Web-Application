{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Registrar Nuevo Huésped</h2>
    <form method="POST" action="{{ url_for('add_guest') }}">
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" name="full_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Teléfono (Opcional)</label>
            <input type="text" name="phone" class="form-control">
        </div>
        <div class="form-group">
            <label>Documento de Identidad / Pasaporte (Opcional)</label>
            <input type="text" name="document_id" class="form-control">
        </div>
        <button type="submit" class="btn">Guardar Huésped</button>
    </form>
</div>
{% endblock %}
