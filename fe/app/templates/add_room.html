{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Agregar Nueva Habitación</h2>
    <form method="POST" action="{{ url_for('add_room') }}">
        <div class="form-group">
            <label>Número de Habitación (Ej. 101A)</label>
            <input type="text" name="room_number" class="form-control" required>
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label>Tipo</label>
                <select name="room_type" class="form-control">
                    <option value="single">Sencilla</option>
                    <option value="double">Doble</option>
                    <option value="suite">Suite</option>
                    <option value="family">Familiar</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Piso</label>
                <input type="number" name="floor" value="1" class="form-control" required>
            </div>
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label>Precio por Noche ($)</label>
                <input type="number" step="0.01" name="price_per_night" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Capacidad Máxima (Personas)</label>
                <input type="number" name="capacity" value="1" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label>Descripción</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn">Guardar Habitación</button>
    </form>
</div>
{% endblock %}
